<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transition Timing Functions</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>Hover inside the container</h2>
    <ol>
        <li>linear &rarr; same speed</li>
        <li>ease &rarr; default speed</li>
        <li>ease-in &rarr; slow start</li>
        <li>ease-out &rarr; slow end</li>
        <li>ease-in-out &rarr; slow start + slow end</li>
    </ol>
    <br>
    <div class="container">
        <div class="box linear">linear</div>
        </p>
        <div class="box ease">ease</div>
        <div class="box ease-in">ease-in</div>
        <div class="box ease-out">ease-out</div>
        <div class="box ease-in-out">ease-in-out</div>
    </div>

</body>

</html>
